version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oeelite_postgres
    restart: always
    environment:
      POSTGRES_USER: oeelite_user
      POSTGRES_PASSWORD: oeelite_password
      POSTGRES_DB: oeelite_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: